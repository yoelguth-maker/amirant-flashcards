<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="90" fill="#0f172a"/>
  <!-- Card shadow -->
  <rect x="105" y="135" width="310" height="220" rx="22" fill="#0f172a" opacity="0.5"/>
  <!-- Card back -->
  <rect x="95" y="125" width="310" height="220" rx="22" fill="#1e3a5f"/>
  <!-- Card front -->
  <rect x="107" y="110" width="310" height="220" rx="22" fill="#1e293b" stroke="#3b82f6" stroke-width="5"/>
  <!-- Letter A -->
  <text x="262" y="255" font-family="Georgia, serif" font-size="110" font-weight="bold"
        fill="#f1f5f9" text-anchor="middle" dominant-baseline="middle">A</text>
  <!-- Hebrew text -->
  <text x="262" y="375" font-family="Arial, sans-serif" font-size="38" font-weight="600"
        fill="#60a5fa" text-anchor="middle">אמירנט</text>
</svg>
